<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Projects</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            color: #333;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            width: min(100%, 380px);
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        p {
            margin: 0 0 1.5rem;
        }

        button {
            background: #1a73e8;
            border: none;
            color: white;
            font-size: 1rem;
            padding: 0.9rem 1.8rem;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div>
        <p>Youtube Subscribe Button</p>
        <button onclick="subscribe()">Subscribe</button>
    </div>

    <script>

        let subscribed = false;

        function loadSubscriptionStatus(){
            const saved = localStorage.getItem('subscribed');
            if(saved){
                subscribed = JSON.parse(saved);
                if(subscribed){
                    document.querySelector('button').innerText = "Subscribed";
                }
            }
        }

        function subscribe(){
            if(document.querySelector('button').innerText == 'Subscribe'){
                document.querySelector("button").innerText = "Subscribed";
                subscribed = true;
                localStorage.setItem('subscribed', JSON.stringify(subscribed));
            }
            else{
                document.querySelector("button").innerText = "Subscribe";
                subscribed = false;
                localStorage.setItem('subscribed', JSON.stringify(subscribed));
            }
        }

        loadSubscriptionStatus();
    </script>
</body>
</html>
