<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advance Functions</title>
</head>
<body>
    
    <script>

        // shortcut function
        //hoisting : calling function way before declaration, used in shortcut function
        greetMessage();

        function greetMessage() {
            console.log("Hello, welcome to the world of functions!");
        }

        // Anonymous function
        // functions are Values, so we can assign them to variables
        const fun = function greet(){
            console.log("Hello, welcome to the world of functions!");
        }
        console.log(fun);
        
        // calling the function using the variable name
        fun(); 

        // using functions as objects elements also called methods
        const obj = {
            name: "Annsu",
            greet: function greeting(){
                console.log("Hello, welcome to the world of functions!");
            }
        }

        // calling the method using the object name and dot notation
        obj.greet();

        // Callback function
        function executeCallback(callback){
            // as callback is itself a function, we can call it using () operator
            callback();
        }

        // Passing a function as an argument to another function
        executeCallback(function callbackFunction(){
            console.log("Hello, welcome to the world of functions!");
        });

        // over till here,


        //Practical Examples
        setTimeout(function(){
            console.log("Hello World");
        }, 7000);
        // this is a asynchronous code, it won't wait for 7 seconds to execute the next line of code, 
        // it will execute the next line of code immediately and 
        // after 7 seconds it will execute the function inside setTimeout

        // setInterval, similar, just keep running code in every 3 second
        setInterval(function(){
            console.log("Interval");
        }, 3000);




    </script>
</body>
</html>
