    <h1>Rock Paper Sissors</h1>

    <button onclick="const compMove = Math.random();
    let Move = '';
    if(compMove >=0 && compMove < 1/3 ){
        Move = 'Rock';
    }
    else if(compMove >= 1/3 && compMove < 2/3) {
        Move = 'Paper';
    }
    else {
        Move = 'Sissors';
    }
    console.log(Move);

    let result = '';
    if(Move === 'Rock') {
        result = 'Tie';
    }
    else if(Move === 'Paper') {
        result = 'You Lose';
    }
    else {
        result = 'You Win';
    }
    alert(`You Picked Rock, Computer Picked ${Move}, ${result}`);
    ">Rock</button>
