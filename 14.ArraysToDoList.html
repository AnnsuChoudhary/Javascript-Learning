<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrays ToDo List</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f4f7fc;
            color: #111827;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
        }

        .todo-app {
            width: 100%;
            max-width: 520px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
            padding: 32px;
        }

        .todo-app h1 {
            margin: 0 0 10px;
            font-size: 2rem;
            letter-spacing: -0.03em;
        }

        .todo-app p {
            margin: 0 0 24px;
            color: #4b5563;
            line-height: 1.6;
        }

        .todo-inputs {
            display: grid;
            gap: 12px;
            margin-bottom: 18px;
        }

        input,
        button {
            width: 100%;
            border-radius: 14px;
            border: 1px solid #d1d5db;
            padding: 14px 16px;
            font-size: 1rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        input:focus,
        button:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.16);
        }

        input {
            background: #f9fafb;
        }

        button {
            background: #4f46e5;
            color: #ffffff;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #4338ca;
        }

        #js-result {
            display: grid;
            gap: 12px;
        }

        .task-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 14px 16px;
        }

        .task-row span {
            display: block;
            color: #111827;
            line-height: 1.4;
        }

        .task-row button {
            width: auto;
            padding: 10px 14px;
            background: #ef4444;
            border: none;
        }

        .task-row button:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>

    <div class="todo-app">
        <h1>ToDo List</h1>
        <p>Add tasks with a due date and remove items when they are complete.</p>

        <div class="todo-inputs">
            <input type="text" id="js-input" placeholder="Enter a task">
            <input type="date" id="js-input-date">
            <button id="js-add3" onclick="addTask()">Add</button>
        </div>

        <div id="js-result"></div>
    </div>

    <script>

        const taskArray = [];
        
        function addTask(){
            const input = document.querySelector('#js-input').value;
            const inputDate = document.querySelector('#js-input-date').value;

            if(input && inputDate){
                const task = {
                    name: input,
                    date: inputDate
                };

                taskArray.push(task);
                document.querySelector('#js-result').innerText = '';

                for(let i = 0; i < taskArray.length; i++){
                    document.querySelector('#js-result').innerHTML += `<span>${taskArray[i].name} - ${taskArray[i].date}</span> <button onclick="deleteTask(${i})">Delete</button> <br>`;
                }
                
                
            }document.querySelector('#js-input').value = '';
            document.querySelector('#js-input-date').value = '';
        }

        function deleteTask(index){
            taskArray.splice(index, 1);
            document.querySelector('#js-result').innerText = '';

            for(let i = 0; i < taskArray.length; i++){
                document.querySelector('#js-result').innerHTML += `<span>${taskArray[i].name} - ${taskArray[i].date}</span> <button onclick="deleteTask(${i})">Delete</button> <br>`;
            }
        }


    </script>
</body>
</html>
