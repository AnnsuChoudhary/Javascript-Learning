<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Projects</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f7f7f7 0%, #e2f0ff 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: #1a1a1a;
        }

        body > div {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 16px 30px rgba(0, 0, 0, 0.08);
            max-width: 380px;
            width: 100%;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        button {
            background: #ff3b3f;
            border: none;
            color: white;
            font-size: 1rem;
            padding: 0.9rem 1.8rem;
            border-radius: 999px;
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(255, 59, 63, 0.22);
        }
    </style>
</head>
<body>
    <div>
        <p>Youtube Subscribe Button</p>
        <button onclick="subscribe()">Subscribe</button>
    </div>

    <script>

        let subscribed = false;

        function loadSubscriptionStatus(){
            const saved = localStorage.getItem('subscribed');
            if(saved){
                subscribed = JSON.parse(saved);
                if(subscribed){
                    document.querySelector('button').innerText = "Subscribed";
                }
            }
        }

        function subscribe(){
            if(document.querySelector('button').innerText == 'Subscribe'){
                document.querySelector("button").innerText = "Subscribed";
                subscribed = true;
                localStorage.setItem('subscribed', JSON.stringify(subscribed));
            }
            else{
                document.querySelector("button").innerText = "Subscribe";
                subscribed = false;
                localStorage.setItem('subscribed', JSON.stringify(subscribed));
            }
        }

        loadSubscriptionStatus();
    </script>
</body>
</html>
